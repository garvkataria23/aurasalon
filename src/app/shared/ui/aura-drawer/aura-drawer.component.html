<div class="aura-drawer-backdrop" *ngIf="open" (click)="onBackdrop()"></div>

<aside
  class="aura-drawer"
  *ngIf="open"
  [class.aura-drawer--380]="width === '380'"
  [class.aura-drawer--480]="width === '480'"
  [class.aura-drawer--640]="width === '640'"
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="title"
>
  <header class="aura-drawer__header">
    <h2>{{ title }}</h2>
    <button class="aura-drawer__close" type="button" aria-label="Close" (click)="close()">x</button>
  </header>

  <section class="aura-drawer__body">
    <ng-content></ng-content>
  </section>

  <footer class="aura-drawer__footer">
    <ng-content select="[slot=footer]"></ng-content>
  </footer>
</aside>

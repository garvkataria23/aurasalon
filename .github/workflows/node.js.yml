name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: |
            package-lock.json
            staff-app/package-lock.json
      - name: Install root dependencies
        run: npm ci
      - name: Install staff dependencies
        run: npm ci --prefix staff-app
      - name: Test root application
        run: npm test
      - name: Build root application
        run: npm run build
      - name: Test staff application
        run: npm test --prefix staff-app
      - name: Build staff application
        run: npm run build --prefix staff-app
      - name: Audit staff production dependencies
        run: npm audit --prefix staff-app --omit=dev --audit-level=high
      - name: Verify staff deployment artifact
        run: test -f staff-app/www/browser/index.html

# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "New project"

[setup]
script = ""

[setup.win32]
script = '''
cd "%CODEX_WORKTREE_PATH%"

echo AuraShine Setup Starting

node -v
npm -v

npm install -g npm@latest
npm install -g @angular/cli
npm install -g nx

npm install

npx nx reset || exit 0

echo Setup Complete
'''

[cleanup]
script = ""

[cleanup.win32]
script = '''
cd "%CODEX_WORKTREE_PATH%"

echo Cleaning AuraShine Workspace

rmdir /s /q .angular\cache 2>nul

echo Cleanup Complete
'''

[[actions]]
name = "Start Dev"
icon = "tool"
command = '''
cd "%CODEX_WORKTREE_PATH%"
npm start
'''

[[actions]]
name = "Build App"
icon = "tool"
command = '''
cd "%CODEX_WORKTREE_PATH%"
npx nx build
'''

[[actions]]
name = "Lint Check"
icon = "tool"
command = '''
cd "%CODEX_WORKTREE_PATH%"
npx nx lint
'''

[[actions]]
name = "Fix Install"
icon = "tool"
command = '''
cd "%CODEX_WORKTREE_PATH%"
npm install
npx nx reset
'''

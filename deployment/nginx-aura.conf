# Aura Salon CRM/POS — Hostinger Nginx config
# Upload via Hostinger Panel → Advanced → NGINX Config Manager
# Or place in /etc/nginx/conf.d/aura-salon.conf on VPS

server {
    listen 80;
    listen [::]:80;
    server_name aurashinesalonwellness.in www.aurashinesalonwellness.in;

    # --- CRITICAL: increase header buffers for large JWT Authorization header ---
    client_header_buffer_size 2k;
    large_client_header_buffers 4 16k;
    client_max_body_size 100m;

    # Proxy to Node.js
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp|avif)$ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
